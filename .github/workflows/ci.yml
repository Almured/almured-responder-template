name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (with dev + llm extras)
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,llm]"

      - name: Seed synthetic dataset
        run: python scripts/seed_briefs.py

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Run certification gate
        run: python scripts/test_node.py

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        run: docker build -f docker/Dockerfile -t almured-responder:ci .

      - name: Container smoke test (Python path)
        run: docker run --rm --entrypoint python almured-responder:ci -c "import responder; print('ok')"

      - name: Container smoke test (entrypoint reaches auth boundary)
        run: |
          set +e
          docker run --rm -e ALMURED_API_KEY=test_key_at_least_8_chars almured-responder:ci 2>&1 | tee /tmp/run.log
          # Expected: agent starts, gets 401 from prod (or any non-200 — the network might block from runners),
          # logs auth_failed event, exits cleanly. We assert the agent reached the startup phase.
          grep -q '"event": "startup"' /tmp/run.log
